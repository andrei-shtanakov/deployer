# Pinned real-world targets for `deployer bench run --include-external`.
# Curated list; entries may use machine-specific local paths when the
# upstream remote is private. Format:
#
# [[targets]]
# name = "some-project"
# url = "https://github.com/owner/repo.git"
# commit = "<full sha>"
# [targets.target]        # optional DeployTarget fields
# [targets.expected]      # optional ExpectedOutcome fields
# expected_success = false

# Local research target (machine-specific path; private EPAM GitLab remote).
# Full-service target: extras + explicit entrypoint intent (app.py) — the
# service-entrypoint disambiguation blocker is closed; see notes below.
[[targets]]
name = "locallogai-backend"
url = "/Users/Andrei_Shtanakov/lab_aist/locallogai-backend"
commit = "a8309d71b93598a402f7c1f0cd92af8fa2626667"
[targets.target]
extras = ["gui"]
entrypoint = "app.py"
[targets.target.service]
port = 7860
healthcheck_path = "/"
[targets.expected]
expected_success = true
max_iterations = 3
requires_l2 = true
capabilities = ["uv", "external", "service", "extras", "python-3.13", "entrypoint"]
notes = "full-service target: gui extra + explicit entrypoint intent (app.py) — the service-entrypoint disambiguation blocker from the 4b-2 run is closed by DeployTarget.entrypoint; healthcheck '/' relies on Gradio's root-200"

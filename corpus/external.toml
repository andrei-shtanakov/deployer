# Pinned real-world targets for `deployer bench run --include-external`.
# Curated list; entries may use machine-specific local paths when the
# upstream remote is private. Format:
#
# [[targets]]
# name = "some-project"
# url = "https://github.com/owner/repo.git"
# commit = "<full sha>"
# [targets.target]        # optional DeployTarget fields
# [targets.expected]      # optional ExpectedOutcome fields
# expected_success = false

# Local research target (machine-specific path; private EPAM GitLab remote).
# Extras are expressible via deploy_target now; the blocker is service-entrypoint
# disambiguation (main.py stub vs. the real app.py Gradio app) — see notes below.
[[targets]]
name = "locallogai-backend"
url = "/Users/Andrei_Shtanakov/lab_aist/locallogai-backend"
commit = "a8309d71b93598a402f7c1f0cd92af8fa2626667"
[targets.target]
extras = ["gui"]
[targets.target.service]
port = 7860
healthcheck_path = "/"
[targets.expected]
expected_success = false
max_iterations = 3
requires_l2 = true
capabilities = ["uv", "external", "service", "extras", "python-3.13"]
notes = "service entrypoint disambiguation missing: script_entrypoint resolves to the main.py stub and the prompt rule makes it binding, while the real Gradio app is app.py — success requires violating an authoring contract. Flip to true when a service-entrypoint fact/intent lands (see 2026-07-22 spec, Deferred)."
